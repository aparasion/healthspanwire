name: Weekly Newsletter

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: '7'
        type: string
      dry_run:
        description: "Preview digest without sending"
        required: false
        default: false
        type: boolean
      send_immediately:
        description: "Send immediately instead of saving as draft"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Generate and send newsletter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_SEND: ${{ github.event.inputs.send_immediately }}
        run: |
          set -euo pipefail

          args=()
          if [ -n "${INPUT_DAYS:-}" ]; then
            args+=(--days "$INPUT_DAYS")
          fi

          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            args+=(--dry-run)
          fi

          if [ "${INPUT_SEND:-false}" = "true" ]; then
            args+=(--send)
          fi

          python scripts/send_newsletter.py "${args[@]}"
