<section class="topic-filter-panel" aria-label="Browse by topic">
  <div class="topic-filter-buttons" role="group" aria-label="Topic filters">
    <a href="/topics/" class="topic-pill{% unless page.topic %} active{% endunless %}">All</a>
    <a href="/topics/#topic=therapeutics" class="topic-pill{% if page.topic == 'therapeutics' %} active{% endif %}">Therapeutics</a>
    <a href="/topics/#topic=biomarkers" class="topic-pill{% if page.topic == 'biomarkers' %} active{% endif %}">Biomarkers</a>
    <a href="/topics/#topic=nutrition" class="topic-pill{% if page.topic == 'nutrition' %} active{% endif %}">Nutrition</a>
    <a href="/topics/#topic=technology" class="topic-pill{% if page.topic == 'technology' %} active{% endif %}">Technology</a>
    <a href="/topics/#topic=policy" class="topic-pill{% if page.topic == 'policy' %} active{% endif %}">Policy</a>
  </div>
</section>
